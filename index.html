<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IPI Partner Advantage</title>

  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ds-bg:#0f171c;
  --ds-surface:#17242b;
  --ds-surface-soft:#1c2b33;
  --ds-surface-muted:rgba(255,255,255,0.03);
  --ds-border:rgba(145,196,176,0.22);
  --ds-border-strong:rgba(145,196,176,0.36);
  --ds-text:#e9f4f1;
  --ds-text-muted:#9bb6b0;
  --ds-title:'Syne',sans-serif;
  --ds-radius-sm:10px;
  --ds-radius-md:14px;
  --ds-radius-lg:18px;
  --ds-shadow-sm:0 8px 20px rgba(5,12,18,0.22);
  --ds-shadow-md:0 14px 36px rgba(5,12,18,0.35);
  --ds-shadow-lg:0 22px 48px rgba(5,12,18,0.45);
}
html,body,#root{width:100%;max-width:100%;min-height:100%;overflow-x:hidden;}
html{scroll-behavior:smooth;}
body{margin:0;background:radial-gradient(circle at top right,#14222a,var(--ds-bg) 45%);color:#DFF0EA;font-family:'Nunito Sans','Helvetica Neue',Arial,sans-serif;min-height:100vh;}
h1,h2,h3,h4,h5,h6,p,span,label,th,td,button{white-space:normal;overflow-wrap:anywhere;word-break:break-word;max-width:100%;}
.page-shell,.page-content,.card,.panel,.table-wrapper,.section{max-width:100%;}
.flex-row,.flex-item,.grid-item,.card-content{min-width:0;max-width:100%;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#0D1618;}
::-webkit-scrollbar-thumb{background:rgba(99,171,143,0.4);border-radius:3px;}

.app-shell,.app-layout{display:flex;width:100%;height:100vh;min-height:100vh;position:relative;max-width:100%;overflow:hidden;overflow-x:hidden;}
.app-sidebar,.sidebar{width:250px;min-width:250px;max-width:250px;flex:0 0 250px;display:flex;flex-direction:column;padding:20px 12px;box-sizing:border-box;border-right:1px solid rgba(255,255,255,0.1);background:linear-gradient(180deg,#121b30,#17263c);backdrop-filter:blur(10px);height:100vh;position:fixed;top:0;left:0;z-index:1000;box-shadow:8px 0 40px rgba(0,0,0,0.35);overflow:hidden;}
.app-main,.page-container{flex:1;min-width:0;width:calc(100% - 250px);max-width:calc(100% - 250px);margin-left:250px;display:flex;flex-direction:column;min-height:0;overflow-y:auto;overflow-x:hidden;}
.page-content{width:100%;max-width:var(--content-max);margin:0 auto;min-width:0;}


.sidebar-top{display:flex;flex-direction:column;gap:14px;margin-bottom:18px;}
.sidebar-brand{display:flex;align-items:center;gap:12px;min-width:0;}
.sidebar-brand-mark{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-weight:700;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);background:rgba(255,255,255,.08);color:#fff;flex-shrink:0;}
.sidebar-brand-copy{min-width:0;}
.sidebar-title{font-size:15px;font-weight:700;line-height:1.2;color:#fff;}
.sidebar-subtitle{font-size:12px;opacity:.7;color:#c6d1e6;}

.sidebar-inner{display:flex;flex-direction:column;flex:1;min-height:0;}
.sidebar-nav-scroll{display:flex;flex-direction:column;flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding-right:4px;scrollbar-width:thin;scrollbar-color:rgba(127,164,216,0.45) transparent;}
.sidebar-nav-scroll::-webkit-scrollbar{width:6px;}
.sidebar-nav-scroll::-webkit-scrollbar-track{background:transparent;}
.sidebar-nav-scroll::-webkit-scrollbar-thumb{background:rgba(127,164,216,0.35);border-radius:999px;}
.sidebar-nav-scroll::-webkit-scrollbar-thumb:hover{background:rgba(127,164,216,0.5);}

.sidebar-nav{display:flex;flex-direction:column;gap:8px;min-width:0;flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;}
.sidebar-nav-item{position:relative;display:flex;align-items:center;gap:12px;width:100%;border:0;background:transparent;padding:12px 14px;border-radius:14px;cursor:pointer;text-align:left;transition:background .2s ease,transform .2s ease,box-shadow .2s ease;color:#E5E7EB;font-weight:500;}
.sidebar-nav-item:hover{background:rgba(255,255,255,.12);color:#fff;}
.sidebar-nav-item.active{background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.14));box-shadow:inset 0 0 0 1px rgba(255,255,255,.2),0 6px 18px rgba(3,8,20,.35);color:#fff;font-weight:500;}
.sidebar-nav-item.active::before{content:"";position:absolute;left:-10px;top:10px;bottom:10px;width:4px;border-radius:999px;background:#9bc4ff;}
.sidebar-nav-icon{width:20px;display:inline-flex;justify-content:center;flex-shrink:0;font-size:16px;}
.sidebar-nav-item.active .sidebar-nav-icon{transform:scale(1.06);}
.sidebar-nav-text{min-width:0;display:flex;flex-direction:column;gap:2px;}
.sidebar-nav-label{min-width:0;white-space:normal;overflow-wrap:anywhere;line-height:1.25;font-size:13px;font-weight:700;color:var(--heading-primary);}
.sidebar-nav-sublabel{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text-secondary);font-weight:600;}
.sidebar-nav-item.active .sidebar-nav-sublabel{color:var(--brand-secondary);}


.ds-page-header{max-width:none;padding:56px 44px 8px;display:flex;flex-direction:column;gap:10px;}
.ds-page-header__eyebrow{display:inline-flex;align-items:center;gap:8px;width:fit-content;border:1px solid var(--ds-border);border-radius:999px;padding:6px 14px;font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:#9dcdbf;background:rgba(99,171,143,0.08);}
.ds-page-header__title{font-family:var(--ds-title);font-size:clamp(28px,4vw,54px);line-height:1.04;letter-spacing:-.035em;color:var(--ds-text);}
.ds-page-header__subtitle{font-size:14px;color:var(--ds-text-muted);line-height:1.75;max-width:920px;}
.ds-section{max-width:none;padding:34px 44px 0;}
.ds-section-header{margin-bottom:16px;display:flex;flex-direction:column;gap:8px;}
.ds-section-header h2{font-family:var(--ds-title);font-size:clamp(22px,2.6vw,34px);letter-spacing:-.03em;color:#fff;line-height:1.1;}
.ds-section-header p{font-size:13px;color:var(--ds-text-muted);line-height:1.7;max-width:860px;}
.ds-card,.channel-card,.prj-journey-card,.prj-contrast-card,.prj-use-case-card{background:var(--ds-surface-muted)!important;border:1px solid var(--ds-border)!important;border-radius:var(--ds-radius-lg)!important;box-shadow:var(--ds-shadow-sm);}
.channel-card:hover,.prj-journey-card:hover,.prj-use-case-card:hover{box-shadow:var(--ds-shadow-md);transform:translateY(-2px);}
.ui-btn,button.ui-btn{height:38px;border-radius:11px;border:1px solid var(--ds-border-strong);padding:0 14px;background:rgba(99,171,143,0.14);color:#ddf3ec;font-size:13px;font-weight:700;cursor:pointer;}
.ui-btn.secondary{background:rgba(255,255,255,0.05);}
.ui-dropdown,input,select,textarea{min-height:38px;border-radius:11px!important;border:1px solid var(--ds-border)!important;background:#f8fbfa!important;color:#162328!important;padding:8px 12px!important;font-size:13px!important;}
.ui-dropdown:focus,input:focus,select:focus,textarea:focus{outline:none;box-shadow:0 0 0 3px rgba(99,171,143,0.2);border-color:rgba(99,171,143,0.55)!important;}
table{border-collapse:separate;border-spacing:0;width:100%;}
thead th{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#9dcdbf;padding:12px 10px;border-bottom:1px solid rgba(145,196,176,0.25);}
tbody td{font-size:12.5px;color:#d8e8e3;padding:11px 10px;border-bottom:1px solid rgba(255,255,255,0.08);vertical-align:top;}
tbody tr:nth-child(even){background:rgba(255,255,255,0.015);}
.status-pill,.channel-chip{display:inline-flex;align-items:center;border-radius:999px;padding:4px 10px;font-size:10px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;border:1px solid rgba(99,171,143,0.34);background:rgba(99,171,143,0.14);color:#9ed4c4;}

.ui-dropdown{background:#fff;border:1px solid #D1D5DB;border-radius:8px;color:#1F2937;font-size:14px;font-weight:500;line-height:1.5;padding:10px 14px;box-shadow:0 6px 16px rgba(0,0,0,0.12);outline:none;}
.ui-dropdown:hover{background:#F3F4F6;color:#111827;}
.ui-dropdown:focus,.ui-dropdown:active{background:#E5E7EB;color:#111827;font-weight:600;}
.ui-dropdown option{background:#fff;color:#1F2937;font-weight:500;}
.ui-dropdown option:checked{background:#E5E7EB;color:#111827;font-weight:600;}
.sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:10px;flex-shrink:0;}
.sidebar-footer-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px;}
.sidebar-footer-title{font-size:12px;font-weight:700;color:#fff;margin-bottom:6px;}
.sidebar-footer-copy{font-size:11px;line-height:1.5;color:rgba(214,223,236,.82);}
.sidebar-footer-meta{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:rgba(185,198,221,.5);line-height:1.6;}

.app-main{flex:1;min-width:0;width:100%;min-height:0;overflow-y:auto;overflow-x:hidden;}


@media (max-width:900px){
  .ds-page-header,.ds-section{padding-left:18px;padding-right:18px;}
}


.bg-dots{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(rgba(99,171,143,0.05) 1px,transparent 1px);background-size:32px 32px;animation:dotDrift 120s linear infinite;}
@keyframes dotDrift{0%{background-position:0 0}100%{background-position:64px 64px}}

.orb{position:fixed;border-radius:50%;filter:blur(180px);pointer-events:none;z-index:0;animation:orbFloat 24s ease-in-out infinite alternate;}
@keyframes orbFloat{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.08) translate(20px,-20px)}}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.93) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes hubPulse{0%,100%{filter:drop-shadow(0 0 12px rgba(99,171,143,0.4));}50%{filter:drop-shadow(0 0 30px rgba(99,171,143,0.7));}}
@keyframes liveDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.7)}}
@keyframes shimmer{0%{opacity:0.6}50%{opacity:1}100%{opacity:0.6}}

.fade-up{animation:fadeUp 0.7s ease both;}

/* Segment hover */
.seg-group{cursor:pointer;}
.seg-fill{transition:all 0.3s ease;}
.seg-group:hover .seg-fill{filter:brightness(1.35);}

/* Toggle */
.toggle-wrap{display:flex;align-items:center;gap:12px;background:rgba(12,20,22,0.92);border:1px solid rgba(99,171,143,0.28);border-radius:100px;padding:8px 18px;backdrop-filter:blur(16px);cursor:pointer;user-select:none;}
.toggle-track{width:48px;height:26px;border-radius:13px;position:relative;transition:background 0.3s;border:1px solid rgba(99,171,143,0.35);}
.toggle-thumb{position:absolute;top:2px;width:20px;height:20px;border-radius:50%;background:#63AB8F;box-shadow:0 0 10px rgba(99,171,143,0.7);transition:left 0.3s cubic-bezier(0.34,1.4,0.64,1);}

/* Modal overlay */
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.72);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.2s ease both;}
.modal-box{position:relative;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;border-radius:20px;animation:scaleIn 0.28s cubic-bezier(0.34,1.2,0.64,1) both;}
.modal-box::-webkit-scrollbar{width:4px;}
.modal-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px;}

/* Product card in modal */
.prod-card{
  border-radius:12px;
  padding:14px 16px;
  cursor:pointer;
  transition:all 0.22s ease;
  border:1px solid transparent;
}
.prod-card:hover{transform:translateY(-2px);}

/* Detail panel */
.detail-panel{animation:scaleIn 0.22s ease both;}

/* Brand line */
.brand-line{height:1px;background:linear-gradient(90deg,transparent 0%,rgba(99,171,143,0.5) 35%,rgba(163,121,146,0.4) 65%,transparent 100%);}

/* Buttons */
.btn-p{background:#63AB8F;border:none;border-radius:9px;padding:13px 26px;font-size:13px;font-weight:800;color:#0F1F1C;cursor:pointer;font-family:'Nunito Sans',sans-serif;letter-spacing:0.02em;transition:all 0.2s;box-shadow:0 4px 20px rgba(99,171,143,0.38);}
.btn-p:hover{background:#75B89D;box-shadow:0 6px 30px rgba(99,171,143,0.58);transform:translateY(-1px);}
.btn-s{background:transparent;border:1.5px solid rgba(99,171,143,0.4);border-radius:9px;padding:13px 26px;font-size:13px;font-weight:800;color:#91C4B0;cursor:pointer;font-family:'Nunito Sans',sans-serif;letter-spacing:0.02em;transition:all 0.2s;}
.btn-s:hover{background:rgba(99,171,143,0.1);border-color:rgba(99,171,143,0.7);transform:translateY(-1px);}

/* Philosophy cards */
.phil-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:22px;transition:all 0.25s ease;}
.phil-card:hover{background:rgba(99,171,143,0.06);border-color:rgba(99,171,143,0.22);transform:translateY(-2px);}

/* Journey step */
.journey-step{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform 0.25s;position:relative;flex:1;min-width:0;}
.journey-step:hover{transform:translateY(-3px);}

/* Platform stack layers */
.stack-layer{
  position:relative;
  border-radius:14px;
  transition:all 0.28s ease;
  cursor:default;
}
.stack-layer:hover{transform:translateY(-3px) scale(1.005);z-index:2;}
.stack-connector{
  display:flex;align-items:center;justify-content:center;
  height:22px;position:relative;
}
.stack-connector::before{
  content:'';position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:1px;height:100%;
  background:linear-gradient(180deg,rgba(99,171,143,0.15),rgba(99,171,143,0.35),rgba(99,171,143,0.15));
}
.stack-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:100px;
  padding:4px 12px;
  font-size:11px;font-weight:700;
  white-space:normal;
  transition:all 0.2s;
}
.stack-pill:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);}

/* Channel Manager Dashboard */
.channel-dashboard-page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;gap:24px;max-width:1280px;padding:24px;width:100%;margin:0 auto;box-sizing:border-box;min-width:0;}
.channel-dashboard-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-left:0;min-width:0;}
.channel-dashboard-pill{background:rgba(99,171,143,0.12);border:1px solid rgba(99,171,143,0.3);color:#91C4B0;font-size:10px;font-weight:800;letter-spacing:0.09em;text-transform:uppercase;border-radius:100px;padding:6px 14px;}
.channel-hero{background:linear-gradient(145deg,rgba(99,171,143,0.14),rgba(15,31,28,0.8));border:1px solid rgba(99,171,143,0.28);border-radius:20px;padding:30px;box-shadow:0 12px 45px rgba(0,0,0,0.3);}
.channel-hero-label{font-size:10px;font-weight:800;color:#91C4B0;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:12px;}
.channel-hero h1{font-size:clamp(28px,4vw,44px);line-height:1.05;letter-spacing:-0.03em;color:#fff;font-family:'Syne',sans-serif;margin-bottom:10px;}
.channel-mission{font-size:18px;color:#DFF0EA;line-height:1.6;max-width:none;margin-bottom:10px;}
.channel-support{font-size:13px;color:#6E9990;line-height:1.75;max-width:980px;}
.channel-hero-layout{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(220px,1fr);gap:18px;align-items:stretch;}
.channel-hero-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
.channel-hero-visual{border:1px solid rgba(99,171,143,0.35);border-radius:16px;padding:16px;background:linear-gradient(165deg,rgba(103,216,255,0.14),rgba(163,121,146,0.12) 50%,rgba(99,171,143,0.14));display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.05);}
.channel-hero-visual-main{font-size:42px;line-height:1;}
.channel-hero-visual p{font-size:12px;font-weight:700;color:#DDF4ED;margin:0;}
.channel-hero-visual-row{display:flex;gap:8px;font-size:16px;}
.channel-kpi-icon,.channel-inline-icon{width:30px;height:30px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:16px;background:rgba(99,171,143,0.18);border:1px solid rgba(99,171,143,0.34);}
.channel-cadence-pill-row{display:flex;flex-wrap:wrap;gap:8px;}

.channel-section{display:flex;flex-direction:column;gap:12px;max-width:100%;min-width:0;}
.channel-title{font-size:24px;font-family:'Syne',sans-serif;color:#fff;letter-spacing:-0.02em;}
.channel-grid-kpi,.channel-grid-4,.channel-grid-5,.channel-grid-3{display:grid;gap:12px;max-width:100%;min-width:0;}
.channel-grid-kpi{grid-template-columns:repeat(auto-fit,minmax(320px,1fr));}
.channel-grid-4{grid-template-columns:repeat(auto-fit,minmax(320px,1fr));}
.channel-grid-5{grid-template-columns:repeat(auto-fit,minmax(320px,1fr));}
.channel-grid-3{grid-template-columns:repeat(auto-fit,minmax(320px,1fr));}
.channel-card{background:var(--bg-surface);border:1px solid var(--border-soft);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:8px;min-width:0;}
.channel-card h3{font-size:14px;color:var(--heading-primary);font-weight:800;line-height:1.35;}
.channel-card p{font-size:12px;color:var(--text-secondary);line-height:1.65;}
.channel-kpi-card{gap:6px;}
.channel-kpi-label{font-size:10px;color:rgba(145,196,176,0.7);text-transform:uppercase;letter-spacing:0.08em;font-weight:800;}
.channel-kpi-value{font-size:30px;font-weight:900;color:var(--heading-primary);font-family:'Syne',sans-serif;line-height:1.05;}
.channel-kpi-hint{font-size:11px;color:var(--text-secondary);}
.channel-kpi-meta{font-size:11px;color:var(--text-primary);font-weight:700;}
.channel-day{font-size:10px;font-weight:800;color:#91C4B0;text-transform:uppercase;letter-spacing:0.1em;}
.channel-lifecycle-flow{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;align-items:stretch;}
.channel-life-stage{gap:10px;}
.channel-life-what{font-size:12px;color:var(--text-primary);}
.channel-list{margin:0;padding-left:18px;display:flex;flex-direction:column;gap:6px;}
.channel-list li{font-size:12px;color:var(--text-secondary);line-height:1.55;}
.channel-step{font-size:13px;font-weight:900;color:var(--heading-primary);letter-spacing:0.01em;}
.channel-outcome{font-size:11px;font-weight:700;color:#91C4B0;border-top:1px solid rgba(99,171,143,0.16);padding-top:8px;margin-top:4px;}
.channel-arrow{align-self:center;justify-self:center;color:rgba(145,196,176,0.8);font-size:20px;font-weight:700;}
.channel-workstream-card{min-height:100%;}
.channel-measure-list{display:flex;flex-wrap:wrap;gap:8px;}
.channel-timeline-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;}
.channel-timeline-card{position:relative;overflow:hidden;}
.channel-timeline-line{height:2px;background:linear-gradient(90deg,#63AB8F,transparent);margin-top:6px;}
.channel-table-wrap{overflow-x:auto;overflow-y:visible;border:1px solid rgba(99,171,143,0.2);border-radius:14px;background:rgba(255,255,255,0.02);width:100%;}
.channel-table{width:100%;border-collapse:collapse;table-layout:auto;}
.channel-table th,.channel-table td{padding:12px 14px;text-align:left;border-bottom:1px solid rgba(99,171,143,0.12);font-size:12px;color:var(--text-primary);vertical-align:top;}
.channel-table th{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-secondary);font-weight:800;background:var(--bg-subtle);}
.channel-chip{display:inline-flex;align-items:center;background:rgba(99,171,143,0.12);border:1px solid rgba(99,171,143,0.28);border-radius:100px;padding:3px 10px;font-size:10px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:#91C4B0;white-space:normal;overflow-wrap:anywhere;}
.channel-two-col{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;max-width:100%;min-width:0;}
.channel-stack{display:flex;flex-direction:column;gap:10px;}
.channel-action-card{flex-direction:row;justify-content:space-between;align-items:center;gap:10px;}
.channel-action-card span:first-child{font-size:12px;color:var(--text-primary);font-weight:700;}
.channel-metric-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;font-size:12px;color:var(--text-primary);}
.channel-metric-head strong{font-size:12px;color:var(--text-secondary);white-space:normal;}

/* Shared design system primitives */
.ui-field{background:var(--ds-surface-muted);border:1px solid var(--ds-border-strong);border-radius:var(--ds-radius-sm);padding:8px 10px;color:var(--ds-text);font-size:12px;outline:none;min-height:38px;}
.ui-field::placeholder{color:var(--ds-text-muted);}
.ui-btn,.ui-btn--primary,.ui-btn--secondary{height:var(--ds-space-xxl);max-height:38px;border-radius:var(--ds-radius-sm);padding:0 var(--ds-space-md);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s ease;}
.ui-btn--primary{background:var(--ds-primary);border:1px solid var(--ds-primary);color:#0e1a18;}
.ui-btn--primary:hover{background:var(--ds-primary-hover);border-color:var(--ds-primary-hover);}
.ui-btn--secondary{background:var(--ds-secondary-bg,var(--ds-surface-muted));border:1px solid var(--ds-border);color:var(--ds-text-secondary);}
.ui-btn--secondary:hover{background:rgba(255,255,255,.1);}
.ds-card{background:var(--ds-surface-muted);border:1px solid var(--ds-border);border-radius:var(--ds-radius-md);box-shadow:var(--ds-shadow-sm);padding:var(--ds-space-lg);}
.ds-card--highlight{background:linear-gradient(145deg,rgba(99,171,143,.14),rgba(15,31,28,.7));border-color:var(--ds-border-strong);}
.ds-metric-card{padding:10px 12px;display:flex;flex-direction:column;gap:4px;}
.ds-metric-card__label{font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#A9C3CE;}
.ds-metric-card__value{font-size:22px;font-weight:800;font-family:var(--ds-title);}
.ds-metric-card__value.tone-success{color:var(--ds-success);} .ds-metric-card__value.tone-danger{color:var(--ds-danger);} .ds-metric-card__value.tone-warning{color:var(--ds-warning);} .ds-metric-card__value.tone-info{color:var(--ds-info);}
.status-badge{display:inline-flex;align-items:center;justify-content:center;width:fit-content;padding:3px 10px;border-radius:var(--ds-radius-pill,999px);font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--ds-border);background:var(--ds-surface-muted);color:var(--ds-text-secondary);}
.status-not-started{background:rgba(123,150,163,.16);border-color:rgba(123,150,163,.35);color:#c7d7df;}
.status-in-progress{background:rgba(123,150,163,.22);border-color:rgba(123,150,163,.45);color:#d6e7f0;}
.status-blocked{background:rgba(214,138,138,.18);border-color:rgba(214,138,138,.45);color:#f0cdcd;}
.status-complete{background:rgba(99,171,143,.2);border-color:rgba(99,171,143,.45);color:#caf1e2;}
.ds-table-wrap{overflow-x:auto;overflow-y:visible;border:1px solid var(--ds-border);border-radius:var(--ds-radius-md);background:rgba(255,255,255,0.02);width:100%;}
.ds-table-wrap table{width:100%;border-collapse:collapse;}
.ds-table-wrap th,.ds-table-wrap td{padding:12px 14px;text-align:left;border-bottom:1px solid color-mix(in srgb,var(--ds-border) 70%, transparent);font-size:12px;color:var(--ds-text-secondary);vertical-align:top;}
.ds-table-wrap th{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ds-primary);font-weight:800;background:rgba(99,171,143,.08);}
.trust-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;align-items:stretch;}

.trust-hero-card{background:linear-gradient(145deg,rgba(103,216,255,.14),rgba(163,121,146,.12) 45%,rgba(99,171,143,.14));}

.trust-pillar{display:flex;align-items:center;gap:9px;border-radius:12px;padding:10px 12px;border:1px solid rgba(123,150,163,.35);background:rgba(13,26,30,.5);font-size:12px;color:#dce8f3;}
.trust-pillar span{font-size:17px;}
.trust-pillar--blue{border-color:rgba(103,216,255,.5);background:rgba(103,216,255,.12);}
.trust-pillar--purple{border-color:rgba(163,121,146,.5);background:rgba(163,121,146,.13);}

.trust-purpose-item{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1px solid rgba(123,150,163,.3);background:rgba(255,255,255,.02);border-radius:12px;}

.operational-framework-grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:14px;position:relative;}
.operational-framework-grid::before{content:"";position:absolute;left:16px;right:16px;top:50%;height:2px;background:linear-gradient(90deg,rgba(54,198,255,0),rgba(54,198,255,.35),rgba(99,171,143,.4),rgba(54,198,255,.35),rgba(54,198,255,0));transform:translateY(-50%);z-index:0;pointer-events:none;}

.operational-framework-card--violet::after{background:radial-gradient(circle at 88% 12%,rgba(177,143,255,.2),transparent 50%);}

.operational-framework-card--purple::after{background:radial-gradient(circle at 88% 12%,rgba(151,126,255,.2),transparent 50%);}

/* ===== IPI unified design system overrides ===== */
:root {
  color-scheme: light;
}
:root[data-theme="dark"] {
  color-scheme: dark;
}
body {
  background: var(--bg-app);
  color: var(--text-primary);
  font-family: var(--font-primary);
  font-size: 16px;
}
h1 { font-size: 32px; font-weight: 600; line-height: 1.2; }
h2 { font-size: 24px; font-weight: 600; line-height: 1.25; }
h3 { font-size: 18px; font-weight: 600; line-height: 1.3; }
p, li, td, input, select, textarea, button { font-size: 15px; }
small, .meta, .sidebar-nav-sublabel, .ds-page-header__eyebrow { font-size: 12px; }

.app-shell { background: var(--bg-app); color: var(--text-primary); height: 100vh; overflow: hidden; overflow-x: hidden; }
.app-main,.page-container { flex: 1; min-width: 0; width: calc(100% - 250px); max-width: calc(100% - 250px); margin-left: 250px; min-height: 0; overflow-y: auto; overflow-x: hidden; }
.page-shell {
  width: 100%;
  max-width: var(--content-max);
  margin: 0 auto;
  padding: var(--space-5);
  box-sizing: border-box;
  min-width: 0;
}
.app-topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4);
  padding: var(--space-4) var(--space-5);
  border-bottom: 1px solid var(--border-soft);
  background: color-mix(in srgb, var(--bg-surface) 92%, transparent);
  backdrop-filter: blur(8px);
}
.app-topbar__eyebrow { color: var(--text-secondary); text-transform: uppercase; letter-spacing: .08em; font-size: 12px; }
.app-topbar__title { color: var(--text-primary); font-size: 18px; font-weight: 600; }

.theme-toggle {
  display: inline-flex;
  background: var(--bg-subtle);
  border: 1px solid var(--border-soft);
  border-radius: 999px;
  padding: 3px;
  gap: 2px;
}
.theme-toggle__btn {
  text-transform: capitalize;
  border: 0;
  border-radius: 999px;
  padding: 6px 10px;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
}
.theme-toggle__btn.is-active {
  background: var(--brand-secondary);
  color: #1F2D27;
}

.app-sidebar {
  background: var(--bg-surface);
  border-right: 1px solid var(--border-soft);
  box-shadow: none;
}
.sidebar-nav-item { color: var(--text-secondary); border: 1px solid transparent; }
.sidebar-nav-item:hover { background: var(--bg-subtle); color: var(--text-primary); }
.sidebar-nav-item.active {
  background: color-mix(in srgb, var(--brand-secondary) 18%, var(--bg-surface));
  border-color: color-mix(in srgb, var(--brand-secondary) 38%, var(--border-soft));
  color: var(--text-primary);
  box-shadow: none;
}
.sidebar-nav-item.active::before { background: var(--brand-secondary); }

.ds-page-header, .ds-section { padding-left: 0; padding-right: 0; }
.ds-page-header { padding-top: var(--space-6); gap: var(--space-3); }
.ds-page-header__eyebrow {
  border: 1px solid var(--border-soft);
  background: var(--bg-subtle);
  color: var(--text-secondary);
}
.ds-page-header__title { color: var(--heading-primary); font-family: var(--font-primary); font-size: 32px; font-weight: 600; }
.ds-page-header__subtitle { color: var(--text-secondary); max-width: 80ch; }

.ds-card,.channel-card,.prj-journey-card,.prj-contrast-card,.prj-use-case-card,
.table-wrapper,.channel-table-wrap {
  background: var(--bg-surface) !important;
  border: 1px solid var(--border-soft) !important;
  border-radius: var(--radius-card) !important;
  box-shadow: var(--shadow-soft);
}
.ui-btn,button.ui-btn,.btn-p,.btn-s {
  height: 40px;
  border-radius: 12px;
  border: 1px solid var(--border-soft);
  background: var(--brand-primary);
  color: #fff;
}
.ui-btn--secondary,.ui-btn.secondary,.btn-s {
  background: var(--bg-subtle);
  color: var(--text-primary);
}
.ui-field,.ui-dropdown,select,input,textarea {
  min-height: 40px;
  border-radius: 12px;
  border: 1px solid var(--border-soft);
  background: var(--bg-surface);
  color: var(--text-primary);
}
.status-badge,.channel-chip {
  border-radius: 999px;
  border: 1px solid var(--border-soft);
  background: var(--bg-subtle);
  color: var(--text-secondary);
}
.table-wrapper table thead th,.channel-table th {
  position: sticky;
  top: 0;
  background: var(--bg-subtle);
  color: var(--text-secondary);
  z-index: 1;
}

@media (max-width: 900px) {
  .page-shell { padding: var(--space-4); }
  .app-topbar { padding: var(--space-4); }
}

.app-main-inner{min-width:0;}

(function initThemeSystem() {
  const STORAGE_KEY = "ipi_theme_mode_v1";
  const root = document.documentElement;

  const tokens = {
    light: {
      "--bg-app": "#F7FBFC",
      "--bg-surface": "#FFFFFF",
      "--bg-subtle": "#EBFAFF",
      "--bg-tint": "#D7F5FF",
      "--border-soft": "#DCE7EA",
      "--text-primary": "#36454F",
      "--text-secondary": "#5E6A72",

    },
    dark: {
      "--bg-app": "#1F272B",
      "--bg-surface": "#263337",
      "--bg-subtle": "#2C3A40",
      "--bg-tint": "#2A3E45",
      "--border-soft": "#3E4B50",
      "--text-primary": "#EFF6F3",
      "--text-secondary": "#D0E5DD",
      "--heading-primary": "#D7B7C8",
      "--brand-primary": "#D7B7C8",
      "--brand-secondary": "#82BBA5",
      "--brand-accent": "#C8988C",
      "--link": "#91C4B0",
      "--focus": "#D7F5FF",
      "--chart-1": "#D7B7C8",
      "--chart-2": "#82BBA5",
      "--chart-3": "#C8988C",
      "--chart-4": "#91C4B0",
      "--chart-5": "#D0E5DD",
    },
  };

  const dsShared = {
    "--font-primary": "'Proxima Nova', Aptos, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",
    "--space-1": "4px",
    "--space-2": "8px",
    "--space-3": "12px",
    "--space-4": "16px",
    "--space-5": "24px",
    "--space-6": "32px",
    "--space-7": "40px",
    "--space-8": "56px",
    "--radius-card": "18px",
    "--content-max": "1280px",
    "--shadow-soft": "0 10px 28px rgba(0,0,0,0.08)",
  };

  const media = window.matchMedia("(prefers-color-scheme: dark)");

  function resolveTheme(mode) {
    if (mode === "system") return media.matches ? "dark" : "light";
    return mode === "dark" ? "dark" : "light";
  }

  function getMode() {
    return localStorage.getItem(STORAGE_KEY) || "system";
  }

  function applyMode(mode) {
    const resolved = resolveTheme(mode);
    root.dataset.theme = resolved;
    root.dataset.themeMode = mode;

    Object.entries(dsShared).forEach(([key, value]) => root.style.setProperty(key, value));
    Object.entries(tokens[resolved]).forEach(([key, value]) => root.style.setProperty(key, value));
  }

  function setMode(mode) {
    const safeMode = ["light", "dark", "system"].includes(mode) ? mode : "system";
    localStorage.setItem(STORAGE_KEY, safeMode);
    applyMode(safeMode);
    window.dispatchEvent(new CustomEvent("ipi-theme-change", { detail: { mode: safeMode } }));
  }

  media.addEventListener("change", () => {
    if (getMode() === "system") applyMode("system");
  });

  // Always launch in dark mode, regardless of previously persisted preference.
  setMode("dark");

  window.appTheme = { setMode, getMode, resolveTheme };
})();

<script>
(function () {
  const DATASET_URL = "./channel_prospects.json";

  const SCORE_TERMS = ['reseller', 'msp', 'integrator', 'telecom', 'uc', 'ccaas', 'it services', 'managed services', 'cloud', 'payments', 'cx', 'ai'];

  function parseNumber(value) {
    if (value === null || value === undefined) return null;
    const cleaned = String(value).replace(/[,£$\s]/g, '').trim();
    if (!cleaned) return null;
    const n = Number(cleaned);
    return Number.isFinite(n) ? n : null;
  }

  function normalizeUrl(value) {
    if (!value) return '';
    const trimmed = String(value).trim();
    if (!trimmed) return '';
    if (/^https?:\/\//i.test(trimmed)) return trimmed;
    return `https://${trimmed}`;
  }

  function formatCurrency(value) {
    if (value === null || value === undefined || Number.isNaN(value)) return '—';
    return new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP', maximumFractionDigits: 0 }).format(value);
  }

  function calculateIdealPartnerScore(record) {
    let score = 0;
    const factors = [];

    const rev = record.numericRevenue;
    if (rev !== null) {
      const revScore = Math.min(20, Math.log10(Math.max(rev, 1)) * 3.8);
      score += revScore;
      factors.push(`Revenue strength +${revScore.toFixed(1)}`);
    }

    const emp = record.numericEmployees;
    if (emp !== null) {
      let empScore = 0;
      if (emp >= 500) empScore = 16;
      else if (emp >= 100) empScore = 12;
      else if (emp >= 25) empScore = 8;
      else if (emp >= 10) empScore = 4;
      score += empScore;
      if (empScore) factors.push(`Employee scale +${empScore}`);
    }

    const digitalBoosts = [
      [record.hasWebsite, 8, 'Website'],
      [record.hasLinkedIn, 8, 'LinkedIn'],
      [!!record.tech_stack, 5, 'Tech stack'],
      [!!record.keywords, 4, 'Keywords'],
      [record.hasEmail, 5, 'Contact email'],
    ];
    digitalBoosts.forEach(([ok, pts, label]) => {
      if (ok) {
        score += pts;
        factors.push(`${label} +${pts}`);
      }
    });

    const channelText = [record.category, record.channel_role, record.channel_segment, record.keywords].join(' ').toLowerCase();
    const termHits = SCORE_TERMS.filter((t) => channelText.includes(t)).length;
    if (termHits) {
      const pts = Math.min(16, termHits * 3);
      score += pts;
      factors.push(`Channel relevance +${pts}`);
    }

    if (record.partners) {
      score += 6;
      factors.push('Partner ecosystem +6');
    }

    if ((record.trading_status || '').toLowerCase().includes('active')) {
      score += 5;
      factors.push('Active trading +5');
    }

    const creditPositives = [record.numericCreditScore, record.numericCreditLimit, record.numericNetWorth].filter((n) => n !== null && n > 0).length;
    if (creditPositives) {
      const pts = Math.min(8, creditPositives * 2.5);
      score += pts;
      factors.push(`Financial quality +${pts.toFixed(1)}`);
    }

    const status = (record.trading_status || '').toLowerCase();
    if (status.includes('dissolved') || status.includes('inactive')) {
      score -= 15;
      factors.push('Inactive penalty -15');
    }
    if (!record.name) {
      score -= 10;
      factors.push('Missing company name -10');
    }

    const keyMissing = [record.industry, record.channel_role, record.country, record.website, record.linkedin].filter((v) => !v).length;
    if (keyMissing >= 4) {
      score -= 8;
      factors.push('Sparse profile penalty -8');
    }

    return { score: Math.max(0, Math.min(100, Math.round(score))), factors };
  }

  function getPartnerTier(score) {
    if (score >= 65) return { label: "Tier 1 – Strategic Target", color: "emerald" };
    if (score >= 55) return { label: "Tier 2 – Strong Prospect", color: "blue" };
    if (score >= 40) return { label: "Tier 3 – Opportunistic", color: "amber" };
    return { label: "Tier 4 – Low Priority", color: "gray" };
  }

  function normalizeRecord(raw, idx) {
    const mapped = {
      id: raw.id || `row-${idx + 1}`,
      name: raw.name || '', industry: raw.industry || '', category: raw.category || '',
      trading_status: raw.trading_status || '', employees: raw.employees || '', channel_role: raw.channel_role || '',
      channel_segment: raw.channel_segment || '', adopter_profile: raw.adopter_profile || '', country: raw.country || '',
      city: raw.city || '', county: raw.county || '', postcode: raw.postcode || '', website: raw.website || '',
      linkedin: raw.linkedin || '', phone: raw.phone || '', email: raw.email || '', domain: raw.domain || '',
      revenue: raw.revenue || '', credit_score: raw.credit_score || '', credit_description: raw.credit_description || '',
      credit_limit: raw.credit_limit || '', net_worth: raw.net_worth || '', var_type: raw.var_type || '',
      year_founded: raw.year_founded || '', partners: raw.partners || '', tech_stack: raw.tech_stack || '',
      keywords: raw.keywords || '', dir1_first: raw.dir1_first || '', dir1_last: raw.dir1_last || '',
      dir1_role: raw.dir1_role || '', dir1_email: raw.dir1_email || '', dir2_first: raw.dir2_first || '',
      dir2_last: raw.dir2_last || '', dir2_role: raw.dir2_role || '', dir2_email: raw.dir2_email || '',
      dir3_first: raw.dir3_first || '', dir3_last: raw.dir3_last || '', dir3_role: raw.dir3_role || '',
      dir3_email: raw.dir3_email || '', ch_link: raw.ch_link || '', accounts_link: raw.accounts_link || ''
    };

    mapped.numericRevenue = parseNumber(mapped.revenue);
    mapped.numericEmployees = parseNumber(mapped.employees);
    mapped.numericCreditScore = parseNumber(mapped.credit_score);
    mapped.numericNetWorth = parseNumber(mapped.net_worth);
    mapped.numericCreditLimit = parseNumber(mapped.credit_limit);
    mapped.displayName = mapped.name || '—';
    mapped.displayRevenue = mapped.numericRevenue !== null ? formatCurrency(mapped.numericRevenue) : '—';
    mapped.displayEmployees = mapped.numericEmployees !== null ? new Intl.NumberFormat('en-GB').format(mapped.numericEmployees) : '—';
    mapped.displayLocation = [mapped.city, mapped.county, mapped.country].filter(Boolean).join(', ') || '—';
    mapped.hasWebsite = !!mapped.website;
    mapped.hasLinkedIn = !!mapped.linkedin;
    mapped.hasEmail = !!(mapped.email || mapped.dir1_email || mapped.dir2_email || mapped.dir3_email);

    const contacts = [1, 2, 3].map((n) => ({
      name: `${mapped[`dir${n}_first`] || ''} ${mapped[`dir${n}_last`] || ''}`.trim(),
      role: mapped[`dir${n}_role`] || '',
      email: mapped[`dir${n}_email`] || ''
    })).filter((c) => c.name || c.role || c.email);
    mapped.contacts = contacts;
    mapped.contactCount = contacts.length;

    const scoreData = calculateIdealPartnerScore(mapped);
    mapped.idealPartnerScore = scoreData.score;
    mapped.scoreBreakdown = scoreData.factors;
    mapped.partnerTier = getPartnerTier(scoreData.score);
    mapped.partnerTierName = mapped.partnerTier.label.split('–')[1]?.trim() || mapped.partnerTier.label;

    mapped.searchHaystack = [
      mapped.name, mapped.industry, mapped.category, mapped.channel_role, mapped.channel_segment,
      mapped.city, mapped.country, mapped.website, mapped.linkedin, mapped.partners, mapped.tech_stack,
      mapped.keywords, ...contacts.map((c) => `${c.name} ${c.role}`)
    ].join(' ').toLowerCase();

    return mapped;
  }

  async function loadProspectsCsv() {
    console.log("Fetching dataset from:", DATASET_URL);

    const response = await fetch(DATASET_URL, { cache: "no-store" });

    if (!response.ok) {
      throw new Error(`Failed to fetch dataset: ${response.status} ${response.statusText}`);
    }

    const parsed = await response.json();
    console.log("Dataset rows:", parsed.length);
    return parsed.map(normalizeRecord);
  }

  function toCsv(records) {
    return Papa.unparse(records.map((r) => ({
      id: r.id, name: r.name, idealPartnerScore: r.idealPartnerScore, industry: r.industry,
      category: r.category, channel_role: r.channel_role, channel_segment: r.channel_segment,
      employees: r.employees, revenue: r.revenue, city: r.city, country: r.country,
      website: r.website, linkedin: r.linkedin, email: r.email, trading_status: r.trading_status,
      partners: r.partners, tech_stack: r.tech_stack, keywords: r.keywords
    })));
  }

  window.ProspectToolUtils = {
    loadProspectsCsv,
    toCsv,
    normalizeUrl,
    formatCurrency,
    parseNumber,
    getPartnerTier,
  };
})();

</script>

// GEOMETRY (SVG diagram)
// ═══════════════════════════════════════════════════════
const SZ = 660,
  CX = 330,
  CY = 330;
const R1 = 108,
  R2 = 310,
  RGAP = 3.5;
const R_HEAD = 240; // heading midpoint radius

const toRad = (deg) => ((deg - 90) * Math.PI) / 180;
function ptXY(r, deg) {
  return { x: CX + r * Math.cos(toRad(deg)), y: CY + r * Math.sin(toRad(deg)) };
}
function sectorPath(r1, r2, a1, a2) {
  const s1 = ptXY(r1, a1),
    e1 = ptXY(r1, a2),
    s2 = ptXY(r2, a1),
    e2 = ptXY(r2, a2);
  const lg = a2 - a1 > 180 ? 1 : 0;
  return `M${s2.x},${s2.y} A${r2},${r2} 0 ${lg} 1 ${e2.x},${e2.y} L${e1.x},${e1.y} A${r1},${r1} 0 ${lg} 0 ${s1.x},${s1.y} Z`;
}

function ThemeToggle() {
  const [mode, setMode] = React.useState(() => window.appTheme?.getMode?.() || "system");

  React.useEffect(() => {
    const sync = (event) => {
      if (event?.detail?.mode) setMode(event.detail.mode);
      else setMode(window.appTheme?.getMode?.() || "system");
    };
    window.addEventListener("ipi-theme-change", sync);
    return () => window.removeEventListener("ipi-theme-change", sync);
  }, []);

  const changeTheme = (next) => {
    setMode(next);
    window.appTheme?.setMode?.(next);
  };

  return (
    <div className="theme-toggle" role="group" aria-label="Theme selection">
      {["light", "dark", "system"].map((option) => (
        <button
          key={option}
          type="button"
          className={`theme-toggle__btn ${mode === option ? "is-active" : ""}`}
          onClick={() => changeTheme(option)}
        >
          {option}
        </button>
      ))}
    </div>
  );
}

// DIAGRAM
// ═══════════════════════════════════════════════════════
function Diagram({ activeZone, complete, onZone }) {
  return (
    <div
      style={{
        position: "relative",
        width: "100%",
        maxWidth: SZ,
        margin: "0",
        aspectRatio: "1/1",
      }}
    >
      <svg
        viewBox={`0 0 ${SZ} ${SZ}`}
        style={{
          width: "100%",
          height: "100%",
          display: "block",
          overflow: "visible",
        }}
      >
        <defs>
          {DATA.zones.map((z) => (
            <React.Fragment key={z.id}>
              <radialGradient
                id={"gn" + z.id}
                cx="50%"
                cy="50%"
                r="65%"
                gradientUnits="objectBoundingBox"
              >
                <stop offset="0%" stopColor={z.color} stopOpacity="0.16" />
                <stop offset="100%" stopColor={z.color} stopOpacity="0.04" />
              </radialGradient>
              <radialGradient
                id={"ga" + z.id}
                cx="50%"
                cy="50%"
                r="65%"
                gradientUnits="objectBoundingBox"
              >
                <stop offset="0%" stopColor={z.color} stopOpacity="0.35" />
                <stop offset="100%" stopColor={z.color} stopOpacity="0.10" />
              </radialGradient>
            </React.Fragment>
          ))}
          <radialGradient id="hubG" cx="40%" cy="35%" r="68%">
            <stop offset="0%" stopColor="#203830" />
            <stop offset="55%" stopColor="#131E1A" />
            <stop offset="100%" stopColor="#0A1410" />
          </radialGradient>
          {/* Glow filter for active segments */}
          <filter id="segGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        {/* Outer guide ring */}
        <circle
          cx={CX}
          cy={CY}
          r={R2}
          fill="none"
          stroke={complete ? "rgba(54,198,255,0.22)" : "rgba(255,255,255,0.05)"}
          strokeWidth="1.2"
          strokeDasharray={complete ? null : "5 8"}
          style={{ transition: "stroke 0.5s" }}
        />
        {/* Inner ring */}
        <circle
          cx={CX}
          cy={CY}
          r={R1 + 1}
          fill="none"
          stroke="rgba(54,198,255,0.08)"
          strokeWidth="0.5"
        />

        {/* ── SECTORS ── */}
        {DATA.zones.map((z) => {
          const q = QUADS[z.quadrant];
          const on = activeZone === z.id || complete;
          const d = sectorPath(R1 + 3, R2 - 3, q.a1, q.a2);

          // Icon & heading position — centred in the arc band
          const headR = (R1 + R2) / 2;
          const hp = ptXY(headR, z.mid);
          const iconR = R1 + (R2 - R1) * 0.38;
          const ip = ptXY(iconR, z.mid);
          const textR = R1 + (R2 - R1) * 0.7;
          const tp = ptXY(textR, z.mid);

          return (
            <g key={z.id} className="seg-group" onClick={() => onZone(z.id)}>
              {/* Fill */}
              <path
                d={d}
                className="seg-fill"
                fill={on ? `url(#ga${z.id})` : `url(#gn${z.id})`}
                style={{ transition: "fill 0.35s" }}
              />
              {/* Border */}
              <path
                d={d}
                fill="none"
                stroke={on ? z.color : "rgba(255,255,255,0.09)"}
                strokeWidth={on ? 2.2 : 0.9}
                style={{
                  transition: "stroke 0.35s,stroke-width 0.35s",
                  filter: on
                    ? `drop-shadow(0 0 10px rgba(${z.glow},0.8))`
                    : "none",
                }}
              />

              {/* ── ICON (large, centred in inner half of arc) ── */}
              <text
                x={ip.x}
                y={ip.y + 10}
                textAnchor="middle"
                fontSize={on ? 40 : 32}
                pointerEvents="none"
                style={{
                  transition: "font-size 0.3s",
                  filter: on
                    ? `drop-shadow(0 0 12px rgba(${z.glow},0.9))`
                    : "none",
                }}
              >
                {z.icon}
              </text>

              {/* ── HEADING (outer half of arc) ── */}
              {/* Line 1 */}
              <text
                x={tp.x}
                y={tp.y - 7}
                textAnchor="middle"
                fontFamily="'Syne','Nunito Sans',sans-serif"
                fontSize={on ? 16 : 14}
                fontWeight="800"
                letterSpacing="-0.3"
                fill={on ? z.color : "rgba(200,228,220,0.80)"}
                pointerEvents="none"
                style={{
                  transition: "fill 0.35s,font-size 0.3s",
                  filter: on
                    ? `drop-shadow(0 0 10px rgba(${z.glow},1))`
                    : "none",
                }}
              >
                {z.label}
              </text>
              {/* Line 2 */}
              <text
                x={tp.x}
                y={tp.y + 12}
                textAnchor="middle"
                fontFamily="'Syne','Nunito Sans',sans-serif"
                fontSize={on ? 16 : 14}
                fontWeight="800"
                letterSpacing="-0.3"
                fill={on ? z.color : "rgba(200,228,220,0.80)"}
                pointerEvents="none"
                style={{
                  transition: "fill 0.35s,font-size 0.3s",
                  filter: on
                    ? `drop-shadow(0 0 10px rgba(${z.glow},1))`
                    : "none",
                }}
              >
                {z.sublabel}
              </text>

              {/* "Click to explore" hint when active */}
              {on && !complete && (
                <text
                  x={tp.x}
                  y={tp.y + 30}
                  textAnchor="middle"
                  fontSize="9"
                  fill={z.color}
                  opacity="0.6"
                  fontFamily="'Nunito Sans',sans-serif"
                  fontWeight="700"
                  letterSpacing="0.05em"
                  pointerEvents="none"
                  style={{ animation: "shimmer 1.8s ease-in-out infinite" }}
                >
                  tap to open
                </text>
              )}
            </g>
          );
        })}

        {/* Dividers */}
        {[0, 90, 180, 270].map((a) => {
          const p1 = ptXY(R1 + 3, a),
            p2 = ptXY(R2 - 3, a);
          return (
            <line
              key={a}
              x1={p1.x}
              y1={p1.y}
              x2={p2.x}
              y2={p2.y}
              stroke="#131E20"
              strokeWidth="7"
            />
          );
        })}

        {/* ── HUB ── */}
        <circle
          cx={CX}
          cy={CY}
          r={R1}
          fill="url(#hubG)"
          stroke={complete ? "rgba(54,198,255,0.9)" : "rgba(54,198,255,0.5)"}
          strokeWidth="2"
          style={{
            animation: "hubPulse 4s ease-in-out infinite",
            transition: "stroke 0.5s",
          }}
        />
        <circle
          cx={CX}
          cy={CY}
          r={R1 - 16}
          fill="none"
          stroke="rgba(54,198,255,0.1)"
          strokeWidth="0.7"
        />
        <circle
          cx={CX}
          cy={CY}
          r={R1 - 34}
          fill="none"
          stroke="rgba(54,198,255,0.06)"
          strokeWidth="0.5"
        />
        <text
          x={CX}
          y={CY - 9}
          textAnchor="middle"
          fontFamily="'Syne',sans-serif"
          fontSize="36"
          fontWeight="800"
          letterSpacing="-1.5"
          fill="white"
          pointerEvents="none"
          style={{ filter: "drop-shadow(0 0 20px rgba(54,198,255,0.9))" }}
        >
          ECX
        </text>
        <text
          x={CX}
          y={CY + 10}
          textAnchor="middle"
          fontFamily="'Nunito Sans',sans-serif"
          fontSize="8.5"
          fontWeight="700"
          letterSpacing="0.6"
          fill="rgba(103,216,255,0.85)"
          pointerEvents="none"
        >
          Unified Comms &amp;
        </text>
        <text
          x={CX}
          y={CY + 23}
          textAnchor="middle"
          fontFamily="'Nunito Sans',sans-serif"
          fontSize="8.5"
          fontWeight="700"
          letterSpacing="0.6"
          fill="rgba(103,216,255,0.85)"
          pointerEvents="none"
        >
          Contact Centre
        </text>
      </svg>
    </div>
  );
}

                        fontWeight: 700,

                      }}

                      {p}
                    </span>
                  ))}
                </div>
              </div>
            </div>
          );
        })()}
    </div>
  );
}

// ProductModal component
function ProductModal({ productName, onClose, onNavigate }) {
  const p = PRODUCT_DATA[productName];
  React.useEffect(() => {
    function onKey(e) {
      if (e.key === "Escape") onClose();
    }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  if (!p)
    return (
      <div className="modal-overlay" onClick={onClose}>
        <div
          className="modal-box"
          style={{
            background: "#1A2B2E",
            border: "1px solid rgba(255,255,255,0.1)",
            padding: 32,
          }}
          onClick={(e) => e.stopPropagation()}
        >
          <div
            style={{
              color: "#8EA6BF",
              fontSize: 14,
              textAlign: "center",
              padding: "40px 0",
            }}
          >
            Product details coming soon for{" "}
            <strong style={{ color: "#fff" }}>{productName}</strong>.
          </div>
          <button
            onClick={onClose}
            style={{
              display: "block",
              margin: "20px auto 0",
              background: "rgba(54,198,255,0.12)",
              border: "1px solid rgba(54,198,255,0.3)",
              borderRadius: 100,
              padding: "9px 22px",
              color: "#67D8FF",
              fontSize: 12,
              fontWeight: 800,
              cursor: "pointer",
              fontFamily: "inherit",
              letterSpacing: "0.06em",
              textTransform: "uppercase",
            }}
          >
            Close
          </button>
        </div>
      </div>
    );

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div
        className="modal-box"
        style={{
          background: "linear-gradient(160deg,#152224,#0E1A1C)",
          border: `1px solid rgba(${p.glow},0.35)`,
          boxShadow: `0 0 60px rgba(${p.glow},0.15), 0 32px 80px rgba(0,0,0,0.7)`,
        }}
        onClick={(e) => e.stopPropagation()}
      >
        {/* Close */}
        <button
          onClick={onClose}
          style={{
            position: "absolute",
            top: 16,
            right: 16,
            width: 32,
            height: 32,
            borderRadius: "50%",
            background: "rgba(255,255,255,0.07)",
            border: "1px solid rgba(255,255,255,0.14)",
            color: "rgba(255,255,255,0.5)",
            fontSize: 16,
            cursor: "pointer",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            zIndex: 2,
            fontFamily: "inherit",
            lineHeight: 1,
          }}
        >
          ×
        </button>

        {/* Header */}
        <div
          style={{
            padding: "28px 28px 20px",
            borderBottom: `1px solid rgba(${p.glow},0.15)`,
          }}
        >
          <div
            style={{
              display: "flex",
              alignItems: "center",
              gap: 10,
              marginBottom: 12,
            }}
          >
            <span
              style={{
                background: `rgba(${p.glow},0.14)`,
                border: `1px solid rgba(${p.glow},0.35)`,
                borderRadius: 100,
                padding: "3px 11px",
                fontSize: 10,
                fontWeight: 800,
                color: p.color,
                letterSpacing: "0.1em",
                textTransform: "uppercase",
              }}
            >
              {p.badge}
            </span>
          </div>
          <h2
            style={{
              fontSize: "clamp(20px,3vw,28px)",
              fontWeight: 800,
              color: "#fff",
              letterSpacing: "-0.03em",
              lineHeight: 1.1,
              marginBottom: 8,
              fontFamily: "'Syne',sans-serif",
            }}
          >
            <span style={{ color: p.color }}>{productName}</span>
          </h2>
          <p
            style={{
              fontSize: 13,
              color: p.color,
              opacity: 0.75,
              fontWeight: 600,
              marginBottom: 12,
            }}
          >
            {p.tagline}
          </p>
          <p style={{ fontSize: 13.5, color: "#7AADA0", lineHeight: 1.8 }}>
            {p.summary}
          </p>
        </div>

        {/* Sections (optional) */}
        {p.sections && (
          <div
            style={{
              padding: "20px 28px 0",
              display: "grid",
              gridTemplateColumns: "repeat(auto-fit,minmax(320px,1fr))",
              gap: 12,
            }}
          >
            {p.sections.map((s, i) => (
              <div
                key={i}
                style={{
                  background: `rgba(${p.glow},0.06)`,
                  border: `1px solid rgba(${p.glow},0.15)`,
                  borderRadius: 12,
                  padding: "14px 16px",
                }}
              >
                <div
                  style={{
                    fontSize: 11,
                    fontWeight: 800,
                    color: p.color,
                    letterSpacing: "0.08em",
                    textTransform: "uppercase",
                    marginBottom: 6,
                  }}
                >
                  {s.title}
                </div>
                <p
                  style={{
                    fontSize: 12,
                    color: "#7AADA0",
                    lineHeight: 1.72,
                    margin: 0,
                  }}
                >
                  {s.body}
                </p>
              </div>
            ))}
          </div>
        )}

        {/* Key features */}
        <div style={{ padding: "20px 28px 0" }}>
          <div
            style={{
              fontSize: 10,
              fontWeight: 800,
              color: `rgba(${p.glow},0.6)`,
              letterSpacing: "0.12em",
              textTransform: "uppercase",
              marginBottom: 12,
            }}
          >
            Key Features
          </div>
          <div
            style={{
              display: "grid",
              gridTemplateColumns: "repeat(auto-fit,minmax(320px,1fr))",
              gap: "6px 14px",
            }}
          >
            {p.highlights.map((h, i) => (
              <div
                key={i}
                style={{ display: "flex", alignItems: "flex-start", gap: 8 }}
              >
                <span
                  style={{
                    color: p.color,
                    fontSize: 11,
                    marginTop: 2,
                    flexShrink: 0,
                  }}
                >
                  ✓
                </span>
                <span
                  style={{ fontSize: 12, color: "#B0CEC8", lineHeight: 1.55 }}
                >
                  {h}
                </span>
              </div>
            ))}
          </div>
        </div>

        {/* Related products */}
        {p.relatedIds && p.relatedIds.length > 0 && (
          <div style={{ padding: "20px 28px 0" }}>
            <div
              style={{
                fontSize: 10,
                fontWeight: 800,
                color: `rgba(${p.glow},0.6)`,
                letterSpacing: "0.12em",
                textTransform: "uppercase",
                marginBottom: 10,
              }}
            >
              Related Products
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {p.relatedIds.map((name) => {
                const rel = PRODUCT_DATA[name];
                const rc = rel ? rel.color : "#67D8FF";
                const rg = rel ? rel.glow : "103,216,255";
                return (
                  <button
                    key={name}
                    onClick={() => onNavigate(name)}
                    style={{
                      background: `rgba(${rg},0.1)`,
                      border: `1px solid rgba(${rg},0.35)`,
                      borderRadius: 100,
                      padding: "7px 16px",
                      fontSize: 11,
                      fontWeight: 800,
                      color: rc,
                      cursor: "pointer",
                      fontFamily: "inherit",
                      letterSpacing: "0.04em",
                      transition: "all 0.2s",
                    }}
                    onMouseEnter={(e) => {
                      e.currentTarget.style.background = `rgba(${rg},0.22)`;
                      e.currentTarget.style.borderColor = `rgba(${rg},0.6)`;
                    }}
                    onMouseLeave={(e) => {
                      e.currentTarget.style.background = `rgba(${rg},0.1)`;
                      e.currentTarget.style.borderColor = `rgba(${rg},0.35)`;
                    }}
                  >
                    {name} →
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Footer: IPI website link */}
        <div
          style={{
            padding: "18px 28px 24px",
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            flexWrap: "wrap",
            gap: 10,
          }}
        >
          <span
            style={{
              fontSize: 10,
              color: `rgba(${p.glow},0.35)`,
              fontWeight: 600,
            }}
          >
            Source: ipintegration.com
          </span>
          {p.url && (
            <a
              href={p.url}
              target="_blank"
              rel="noopener noreferrer"
              style={{
                display: "inline-flex",
                alignItems: "center",
                gap: 6,
                background: `rgba(${p.glow},0.1)`,
                border: `1px solid rgba(${p.glow},0.3)`,
                borderRadius: 100,
                padding: "7px 16px",
                fontSize: 11,
                fontWeight: 800,
                color: p.color,
                textDecoration: "none",
                letterSpacing: "0.04em",
                transition: "all 0.2s",
              }}
              onMouseEnter={(e) => {
                e.currentTarget.style.background = `rgba(${p.glow},0.2)`;
              }}
              onMouseLeave={(e) => {
                e.currentTarget.style.background = `rgba(${p.glow},0.1)`;
              }}
            >
              View on IPI website ↗
            </a>
          )}
        </div>
      </div>
    </div>
  );

function PlatformStack() {
  const [activeId, setActiveId] = React.useState(null);
  const [productModal, setProductModal] = React.useState(null);

  function toggle(id) {
    setActiveId((prev) => (prev === id ? null : id));
  }

  const layerById = React.useMemo(() => {
    const entries = STACK_LAYERS.filter((layer) => layer.label).map((layer) => [
      layer.id,
      layer,
    ]);
    return new Map(entries);
  }, []);

  const visibleLayers = React.useMemo(
    () =>
      STACK_LAYERS.filter((layer) => layer.span !== "half").map((layer) => {
        if (layer.span === "half-row") {
          return {
            ...layer,
            layers: layer.layers.map((id) => layerById.get(id)).filter(Boolean),
          };
        }
        return layer;
      }),
    [layerById],
  );

  return (
    <React.Fragment>
      <section
        style={{
          maxWidth: "none",
          margin: "0",
          padding: "52px 44px 0",
          width: "100%",
        }}

          <h2
            style={{

              letterSpacing: "-0.03em",
              lineHeight: 1.1,
              marginBottom: 10,
              fontFamily: "'Syne',sans-serif",

            How the platform{" "}

              fontSize: 14,
              color: "#8EA6BF",
              maxWidth: "none",
              margin: "0",
              lineHeight: 1.75,

          >

            integrated solution. Click any{" "}
            <span style={{ color: "#67D8FF", fontWeight: 700 }}>
              product pill ↗
            </span>{" "}
            to explore full product details.
          </p>
        </div>

        {/* Stack */}
        <div
          style={{
            display: "flex",
            flexDirection: "column",
            gap: 0,
            position: "relative",
          }}
        >
          {/* Left rail label */}
          <div
            style={{
              position: "absolute",

              bottom: 0,
              display: "flex",
              alignItems: "center",
              pointerEvents: "none",
            }}
          >
            <div
              style={{

              }}

          </div>

          {visibleLayers.map((layer, index) => (
            <React.Fragment key={layer.id}>
              {layer.span === "half-row" ? (
                <div
                  style={{
                    display: "grid",
                    gridTemplateColumns: "repeat(2, minmax(0, 1fr))",
                    gap: 12,
                    width: "100%",

                  {layer.layers.map((subLayer) => (
                    <StackLayerFull
                      key={subLayer.id}

                      onToggle={() => toggle(subLayer.id)}
                      onProduct={setProductModal}

                </div>
              ) : (
                <StackLayerFull
                  layer={layer}
                  isActive={activeId === layer.id}

              textAlign: "center",

        </div>
      </section>

      {/* Product Modal */}
      {productModal && (
        <ProductModal
          productName={productModal}
          onClose={() => setProductModal(null)}
          onNavigate={(name) => setProductModal(name)}
        />
      )}
    </React.Fragment>
  );
