<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>IPI Partner Advantage</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/prospectTool.css">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <script>
    (function (location) {
      if (location.search.startsWith("?/")) {
        const rewrittenPath = location.search
          .slice(1)
          .replace(/~and~/g, "&");
        window.history.replaceState(null, "", rewrittenPath + location.hash);
      }
    })(window.location);
  </script>
</head>

<body>

<div id="root"></div>

<noscript>This app requires JavaScript enabled in the browser.</noscript>

<script src="theme.js"></script>
<script src="js/prospectTool.js"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
